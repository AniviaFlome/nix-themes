name: Deploy Docs

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Search Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build search site
        run: nix build ./dev#search --no-write-lock-file

      # NuschtOS/search must be built with baseHref="/" due to an Angular SSR
      # prerender bug with non-root base hrefs. We rewrite <base href> in the
      # deployed HTML so assets resolve correctly on GitHub Pages (/nix-themes/).
      - name: Patch base href for GitHub Pages
        run: |
          cp -rL result site
          chmod -R u+w site
          find site -name "*.html" -exec sed -i 's|<base href="/">|<base href="/nix-themes/">|g' {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
